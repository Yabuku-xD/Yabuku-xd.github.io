<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Ambient</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0c0c0a; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="hero-ambient" data-width="1920" data-height="1080" style="position:fixed;inset:0;">
    <canvas id="canvas" style="position:fixed;inset:0;width:100vw;height:100vh;z-index:0;"></canvas>
    <div style="position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(12,12,10,0.4) 70%, rgba(12,12,10,0.85) 100%);pointer-events:none;"></div>
    <div id="vignette" style="position:fixed;inset:0;z-index:2;background:radial-gradient(circle at 30% 70%, rgba(200,160,60,0.03) 0%, transparent 50%), radial-gradient(circle at 70% 30%, rgba(180,120,60,0.03) 0%, transparent 50%);pointer-events:none;"></div>
    <div style="position:fixed;inset:0;z-index:3;opacity:0.035;background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22/%3E%3C/svg%3E');pointer-events:none;"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js"></script>
  <script>
    (function(){
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      function mulberry32(a) {
        return function() {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }
      }
      const rand = mulberry32(42);

      const PARTICLE_COUNT = 120;
      const CONNECTION_DIST = 160;
      const particles = [];
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = rand() * W;
          this.y = rand() * H;
          this.vx = (rand() - 0.5) * 0.4;
          this.vy = (rand() - 0.5) * 0.4;
          this.radius = rand() * 1.5 + 0.5;
          this.alpha = rand() * 0.4 + 0.1;
          this.hue = rand() * 30 + 25;
        }
        update(t) {
          const noiseX = Math.sin(t * 0.0003 + this.y * 0.003) * 0.2;
          const noiseY = Math.cos(t * 0.0004 + this.x * 0.003) * 0.2;
          this.x += this.vx + noiseX;
          this.y += this.vy + noiseY;
          if (this.x < -20) this.x = W + 20;
          if (this.x > W + 20) this.x = -20;
          if (this.y < -20) this.y = H + 20;
          if (this.y > H + 20) this.y = -20;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, 60%, 65%, ${this.alpha})`;
          ctx.fill();
        }
      }
      for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

      const orbs = [
        { x: 0.3, y: 0.4, r: 0.15, speed: 0.00015, offset: 0 },
        { x: 0.7, y: 0.6, r: 0.1, speed: 0.00012, offset: 2 },
        { x: 0.5, y: 0.3, r: 0.08, speed: 0.00018, offset: 4 }
      ];

      function drawOrb(orb, time) {
        const cx = W * orb.x + Math.sin(time * orb.speed + orb.offset) * W * 0.05;
        const cy = H * orb.y + Math.cos(time * orb.speed * 0.7 + orb.offset) * H * 0.05;
        const r = Math.min(W, H) * orb.r;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, 'rgba(200, 160, 60, 0.08)');
        grad.addColorStop(0.5, 'rgba(180, 120, 40, 0.03)');
        grad.addColorStop(1, 'rgba(180, 120, 40, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECTION_DIST) {
              const alpha = (1 - dist / CONNECTION_DIST) * 0.12;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(200, 160, 60, ${alpha})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      const tl = gsap.timeline({ repeat: -1 });
      const state = { t: 0 };
      tl.to(state, { t: 1, duration: 60, ease: 'none', onUpdate: function() {
        const time = this.time() * 1000;
        ctx.clearRect(0, 0, W, H);
        orbs.forEach(orb => drawOrb(orb, time));
        drawConnections();
        particles.forEach(p => { p.update(time); p.draw(); });
      }});

      window.__timelines = window.__timelines || {};
      window.__timelines['hero-ambient'] = tl;

      gsap.to('#vignette', { opacity: 0.3, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut' });
    })();
  </script>
</body>
</html>
